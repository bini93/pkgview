name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run release-please CLI
        id: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          OUTPUT=$(npx --yes release-please@16 release-pr \
            --repo-url bini93/pkgview \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json \
            --token "${{ github.token }}" \
            --debug 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          echo "--- Exit code: $EXIT ---"

          PR_URL=$(echo "$OUTPUT" | grep -oP 'https://github\.com/[^\s"]+/pull/[0-9]+' | head -1)
          if [ -n "$PR_URL" ]; then
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "prs_created=true" >> "$GITHUB_OUTPUT"
            echo "pr=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "PR created/updated: $PR_URL"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "prs_created=false" >> "$GITHUB_OUTPUT"
            echo "No PR created."
          fi

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
