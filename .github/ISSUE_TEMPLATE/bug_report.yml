name: Bug Report
description: Something is not working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: pkgview version
      description: Run `pkgview --version`
      placeholder: "0.x.y"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command & Output
      description: The exact command you ran and the full output / error message
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might be relevant (installed package managers, PATH, etc.)
